spring.application.name=plataformaempreendedorismo
spring.profiles.active=dev

# Configuracoes do DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/db_empreendedorismo?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracoes do JPA/Hibernate
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
#spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

#Swagger
springdoc.api-docs.path=/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
spring.mvc.static-path-pattern=/uploads/**

#Config de Upload
spring.servlet.multipart.enabled=true
server.tomcat.max-swallow-size=-1
spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=30MB

#SENHAS PADROES
senha.padrao.novo.usuario.aluno=plataformadlei#
